# Netlify configuration: force Ubuntu Noble (24.04) build image and standard build settings
[build]
  # Use the Noble 24.04 build image (Ubuntu 24.04)
  image = "ubuntu-24.04"

  # Vite default output is `dist`
  publish = "dist"

  # Use the project build command
  command = "npm run build"

[build.environment]
  # Explicitly request Node 20 on the build image (Noble supports 20.x)
  NODE_VERSION = "20"

# Optional: add headers, redirects or other Netlify settings below

