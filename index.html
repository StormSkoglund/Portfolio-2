<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Fonts: Roboto (headings) + Inter (body) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- Set dark mode by default to avoid flash-to-light; respect stored preference if present -->
    <script>
      try {
        const stored = localStorage.getItem("theme");
        if (stored === "dark") {
          document.documentElement.classList.add("dark");
        } else if (!stored) {
          // No saved preference: default to dark and persist
          localStorage.setItem("theme", "dark");
          document.documentElement.classList.add("dark");
        }
      } catch (e) {
        /* ignore errors (e.g. blocked storage) */
      }
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon-min.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio |Alex Storm Skoglund</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
